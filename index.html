<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionBro | 影視元宇宙入口</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           1. 基礎重置與背景
           ============================================ */
        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            overflow: hidden; width: 100%; height: 100%;
            font-family: 'Oswald', sans-serif;
        }

        #entry-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; transition: opacity 1.2s ease, visibility 1.2s;
        }

        /* 影院級背景影片 */
        .bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; opacity: 0.7;
        }

        /* 暗角遮罩：增加電影氛圍感，讓中心發光 */
        #entry-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: -1; pointer-events: none;
        }

        /* ============================================
           2. LOGO 定位與特效 (中上部)
           ============================================ */
        .logo-wrapper {
            position: absolute;
            top: 15%; /* 定位在畫面上方 15% 處 */
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-portal {
            width: 180px; height: 180px; border-radius: 50%;
            border: 2px solid rgba(0, 123, 255, 0.8);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 40px rgba(0, 123, 255, 0.6), inset 0 0 20px rgba(0, 123, 255, 0.4);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; animation: portalFloat 4s ease-in-out infinite;
        }

        .logo-portal img {
            width: 100%; height: 100%; object-fit: contain;
            /* 🔥 關鍵：濾掉圖片黑底 */
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 10px rgba(0, 123, 255, 0.8));
        }

        @keyframes portalFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        /* ============================================
           3. 進入按鈕 (紅框位置 - 底部)
           ============================================ */
        .entry-btn {
            position: absolute;
            bottom: 10%; /* 定位到畫面紅框底部 */
            padding: 16px 60px;
            background: rgba(10, 10, 20, 0.6);
            border: 2px solid #007bff;
            border-radius: 50px;
            color: #fff;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.4rem;
            letter-spacing: 12px; /* 增加字距，更有電影感 */
            text-indent: 12px; /* 修正字距造成的偏心 */
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.4);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .entry-btn:hover {
            background: #007bff;
            box-shadow: 0 0 50px rgba(0, 123, 255, 0.8);
            transform: scale(1.05); letter-spacing: 15px;
        }

        #entry-overlay.fade-out { opacity: 0; visibility: hidden; }

        /* ============================================
           4. 後續內容 (隱藏在遮罩後)
           ============================================ */
        main {
            width: 100%; height: 100vh; background: #000;
            display: flex; justify-content: center; align-items: center;
            text-align: center;
        }
        .reveal-logo { font-size: 4rem; letter-spacing: 10px; opacity: 0; transform: translateY(20px); transition: 1s; }
        .reveal-logo.active { opacity: 1; transform: translateY(0); }

        /* 手機版適配 */
        @media (max-width: 768px) {
            .logo-portal { width: 140px; height: 140px; }
            .entry-btn { font-size: 1.1rem; padding: 12px 40px; letter-spacing: 6px; bottom: 12%; }
        }
    </style>
</head>
<body>

    <div id="entry-overlay">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="bg.mp4" type="video/mp4">
        </video>
        
        <div class="logo-wrapper">
            <div class="logo-portal">
                <img src="my-photo.png" alt="ActionBro Logo">
            </div>
        </div>
        
        <button class="entry-btn" onclick="startExperience()">進入影視元宇宙</button>
    </div>

    <main id="main-content">
        <h1 id="inner-logo" class="reveal-logo">影視元宇宙</h1>
    </main>

    <script>
        function startExperience() {
            // 1. 遮罩淡出
            const overlay = document.getElementById('entry-overlay');
            overlay.classList.add('fade-out');
            
            // 2. 觸發內部內容動畫
            setTimeout(() => {
                document.getElementById('inner-logo').classList.add('active');
            }, 800);
        }

        // 確保按鈕在點擊時有觸感回饋
        document.querySelector('.entry-btn').addEventListener('touchstart', function(){
            this.style.transform = 'scale(0.95)';
        });
        document.querySelector('.entry-btn').addEventListener('touchend', function(){
            this.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
