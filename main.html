<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionBro | 影視元宇宙</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            scroll-behavior: smooth; font-family: 'Oswald', sans-serif; 
            overflow-x: hidden; width: 100%;
        }
        
        /* --- 1. 側邊選單：絲綢質感 + 手機版優化 --- */
        .drawer-menu {
            position: fixed; left: 0; top: 0; width: 0px; height: 100vh;
            overflow: hidden; transition: width 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2000; display: flex; flex-direction: column; justify-content: center;
            backdrop-filter: blur(15px);
            background: repeating-linear-gradient(160deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 1px, transparent 1px, transparent 12px),
                        linear-gradient(120deg, rgba(10, 10, 10, 0.98) 0%, rgba(30, 30, 30, 0.9) 50%, rgba(5, 5, 5, 0.98) 100%);
            box-shadow: inset -5px 0 20px rgba(0,0,0,0.8);
        }

        /* 電腦版：維持 10px 絲綢邊緣懸浮 */
        @media (min-width: 769px) {
            .drawer-menu { width: 10px; }
            .drawer-menu:hover { width: 300px; }
            .drawer-menu:hover a { transform: translateX(0); opacity: 1; }
        }

        /* 手機版：點擊後展開的寬度 */
        .drawer-menu.active { width: 80vw !important; border-right: 1px solid rgba(255,255,255,0.2); }
        .drawer-menu.active a { transform: translateX(0); opacity: 1; }

        .drawer-menu a {
            color: #eee; text-decoration: none; font-family: 'Noto Serif TC', serif;
            font-size: 1.8rem; letter-spacing: 3px; margin: 25px auto;
            transition: 0.4s; transform: translateX(-30px); opacity: 0; 
            text-align: center; width: 100%; display: block;
        }
        .drawer-menu a:hover { color: #fff; text-shadow: 0 0 15px #fff; transform: scale(1.1); }
        .sub-text { font-family: 'Microsoft JhengHei', sans-serif; font-size: 0.85rem; color: #888; display: block; margin-top: 5px; }

        /* --- 2. 手機版專用漢堡按鈕 --- */
        .menu-btn {
            position: fixed; top: 25px; left: 20px; z-index: 3000;
            width: 30px; height: 20px; cursor: pointer; display: none;
            flex-direction: column; justify-content: space-between;
        }
        .menu-btn div { width: 100%; height: 2px; background: #fff; transition: 0.3s; }

        /* --- 3. 圖書館卡片美化 (加入海報質感) --- */
        .grid { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1200px; }
        .item { 
            position: relative; width: 280px; height: 400px; background: #111; 
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px;
            transition: 0.5s; cursor: pointer; box-sizing: border-box;
        }
        .item::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%);
            z-index: 1; transition: 0.5s;
        }
        .item:hover { transform: translateY(-10px); border-color: #fff; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .item:hover::before { background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.7) 100%); }

        /* 卡片背景圖範例 */
        .item-pr { background: url('https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?q=80&w=600') center/cover; }
        .item-davinci { background: url('https://images.unsplash.com/photo-1535016120720-40c646bebbbb?q=80&w=600') center/cover; }
        .item-capcut { background: url('https://images.unsplash.com/photo-1536240478700-b869070f9279?q=80&w=600') center/cover; }

        .item h3 { position: relative; z-index: 2; margin: 0; font-size: 1.5rem; letter-spacing: 2px; }
        .item p { position: relative; z-index: 2; margin: 5px 0 0; color: #aaa; font-size: 0.8rem; letter-spacing: 3px; }

        /* --- 4. 內容區塊與打字機 --- */
        section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px 20px; box-sizing: border-box; }
        #hero { background: linear-gradient(rgba(0,0,0,0.6), #000), url('https://images.unsplash.com/photo-1492691523569-fc010075d362?q=80&w=2070') center/cover; }
        .logo { font-family: 'Noto Serif TC', serif; font-size: 5rem; letter-spacing: 15px; margin: 20px 0; text-align: center; }
        
        .typing-effect {
            font-size: 1.2rem; letter-spacing: 5px; color: #fff; border-right: 3px solid #fff;
            white-space: nowrap; overflow: hidden; width: fit-content;
            animation: typing 2.5s steps(30, end), blink-caret 0.75s step-end infinite;
        }

        .enter-link {
            margin-top: 50px; padding: 15px 40px; border: 1px solid #fff;
            text-decoration: none; color: #fff; transition: 0.3s; letter-spacing: 5px;
        }
        .enter-link:hover { background: #fff; color: #000; }

        /* --- 5. 強力手機版 RWD --- */
        @media (max-width: 768px) {
            .menu-btn { display: flex; }
            .logo { font-size: 2.5rem !important; letter-spacing: 5px !important; line-height: 1.4; }
            .typing-effect { font-size: 0.9rem !important; letter-spacing: 2px !important; }
            
            #library h2 { font-size: 2.2rem !important; }
            .grid { flex-direction: column; align-items: center; }
            .item { width: 90% !important; height: 200px !important; }
            
            .service-title { font-size: 1.8rem !important; text-align: center; }
            #services p { font-size: 0.9rem; text-align: center; }
        }

        /* 動畫效果 */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink-caret { from, to { border-color: transparent; } 50% { border-color: #fff; } }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>

    <div class="drawer-menu" id="drawer">
        <a href="#hero" onclick="closeMenu()">HOME<br><span class="sub-text">首頁</span></a>
        <a href="#library" onclick="closeMenu()">LIBRARY<br><span class="sub-text">剪輯圖書室</span></a>
        <a href="#services" onclick="closeMenu()">SERVICES<br><span class="sub-text">客製化服務</span></a>
    </div>

    <section id="hero">
        <div class="typing-container">
            <p class="typing-effect">ACTIONBRO PRESENTS</p>
        </div>
        <h1 class="logo reveal">影視元宇宙</h1>
        <p style="margin-top: 20px; color: #888;" class="reveal">SCROLL TO ENTER</p>
    </section>

    <section id="library">
        <h2 class="reveal" style="font-size: 3rem; margin-bottom: 50px;">剪輯圖書館</h2>
        <div class="grid reveal">
            <div class="item item-pr" onclick="location.href='library.html'">
                <h3>PR 專業教學</h3>
                <p>VIEW LIBRARY</p>
            </div>
            <div class="item item-davinci" onclick="location.href='library.html'">
                <h3>達芬奇調色</h3>
                <p>VIEW LIBRARY</p>
            </div>
            <div class="item item-capcut" onclick="location.href='library.html'">
                <h3>剪映快剪</h3>
                <p>VIEW LIBRARY</p>
            </div>
        </div>
    </section>

    <section id="services">
        <p style="color: #666;" class="reveal">CUSTOM PRODUCTION</p>
        <h2 class="service-title reveal">客製化影音工作室</h2>
        <p class="reveal" style="max-width: 600px; text-align: center; color: #888;">
            無論是長影音的深度敘事，還是短影音的流量爆發，我們為您提供最專業的視覺方案。
        </p>
        <a href="service.html" class="enter-link reveal">進入</a>
    </section>

    <script>
    // 1. 選單邏輯：解決手機版鎖死
    function toggleMenu() {
        document.getElementById('drawer').classList.toggle('active');
    }
    function closeMenu() {
        document.getElementById('drawer').classList.remove('active');
    }

    // 2. 滾動顯示特效 (Scroll Reveal)
    function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        for (var i = 0; i < reveals.length; i++) {
            var windowHeight = window.innerHeight;
            var elementTop = reveals[i].getBoundingClientRect().top;
            if (elementTop < windowHeight - 100) {
                reveals[i].classList.add("active");
            }
        }
    }
    window.addEventListener("scroll", reveal);
    reveal(); // 頁面載入時先執行一次
    </script>

</body>
</html>
